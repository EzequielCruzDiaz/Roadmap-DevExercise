<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-... tu código de integridad ..." crossorigin="anonymous" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apolo.Com</title>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-color:#f4f4f4;
        margin: 0;
        padding:0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

      form{
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgb(0,0,0.1);
        max-width: 400px;
        width: 100%; 

      }
      label{
        display: block;
        margin-bottom: 8px;
      }

      input,textarea{
        width: 100%;
        padding: 8px;
        margin-bottom: 16px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      button{
        background-color: green;
        color:white;
        padding: 10px;
        border:none;
        border-radius:4px;
        cursor: pointer;
      }

      button:hover{
        background-color: #45a049;
      }
</style>
<head>
  <body>
    <form>
      <h2>Formulario Inicio de Sesion</h2>
      <label for="nombre">Nombre:</label>
      <input type ="text" id="nombre" name="nombre"required>

      <label for="email">Correo Electrónico:</label>
      <input type="email" id="email" name="email" required>

      <label for="contraseña">contraseña:</label>
      <input type="contraseña" id="contraseña" name="contraseña"required>

        <div class="Olvidaste la contraseña">
          <a href="#">Se te olvido la contraseña?</a>
        </div>
      
      <button type="submit">Registrarse</button>
      <button type="submit">Iniciar Sesion</button>

        <div class="Icons"></div>
        <span class="icono"><i class="fab fa-google"></i></span>
        <span class="icono"><i class="fab fa-github"></i></span>
        
    </form>
  </body>
</head>
